# Producción MONOLITO en VM — frontend + backend en el MISMO origen.
# Django sirve el SPA de React (bundles de webpack via WhiteNoise) y la API juntos,
# así que NO hay CORS ni cookies cross-subdominio: el login funciona sin líos.
#
# Aislado de otros servicios de la VM:
#   - Solo escucha en loopback (127.0.0.1) en un puerto raro: 58427
#   - Red interna propia (panoptes_internal) y volumen propio (panoptes_pgdata)
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file backend/.env up -d --build
#   docker compose -f docker-compose.prod.yml --env-file backend/.env exec backend python manage.py migrate --noinput
#
# Proxy (Nginx):  avant.init.com.mx  ->  http://127.0.0.1:58427

name: panoptes-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: panoptes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panoptes_change_me}
      POSTGRES_DB: panoptes
    volumes:
      - panoptes_pgdata:/var/lib/postgresql/data
    networks:
      - panoptes_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panoptes -d panoptes"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - panoptes_internal

  broker:
    image: rabbitmq:alpine
    restart: unless-stopped
    networks:
      - panoptes_internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    # migrate + collectstatic en cada arranque: mantiene el esquema de la DB y los
    # estáticos (WhiteNoise + ManifestStaticFilesStorage: bundles de React + CSS) al día.
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn project_name.wsgi
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --log-file -"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgres://panoptes:${POSTGRES_PASSWORD:-panoptes_change_me}@db:5432/panoptes
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@broker:5672//
      CELERY_BROKER_URL: amqp://guest:guest@broker:5672//
    ports:
      # Solo loopback + puerto raro: Nginx hace de reverse proxy hacia aquí.
      - "127.0.0.1:58427:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      broker:
        condition: service_started
    networks:
      - panoptes_internal

  celery:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery --app=project_name worker --loglevel=info
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgres://panoptes:${POSTGRES_PASSWORD:-panoptes_change_me}@db:5432/panoptes
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@broker:5672//
      CELERY_BROKER_URL: amqp://guest:guest@broker:5672//
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      broker:
        condition: service_started
    networks:
      - panoptes_internal

volumes:
  panoptes_pgdata:

networks:
  panoptes_internal:
    name: panoptes_internal
    driver: bridge

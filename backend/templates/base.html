{% load render_bundle from webpack_loader %}
{% load static %}

<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <title>{% block title %}{% endblock %}</title>
  <meta name="description" content="" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <link rel="icon" type="image/png" href="{% static 'panoptes/img/favicon.png' %}" />
  <link rel="apple-touch-icon" href="{% static 'panoptes/img/panoptes-logo-128.png' %}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />

  <!-- Webpack rendered CSS -->
  {% render_bundle 'main' 'css' %}
</head>

<body>
  {% include 'includes/sentry_init.html' %}

  <!-- Body Content -->
  {% block body %}{% endblock %}

  <!-- django-js-reverse -->
  <script src="{% url 'js_reverse' %}" type="text/javascript"></script>

  <!-- Webpack rendered Javascript -->
  {% render_bundle 'main' 'js' 'DEFAULT' %}
  {% block scripts %}{% endblock %}
</body>
</html>

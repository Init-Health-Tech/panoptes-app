components:
  schemas:
    ActiveModules:
      type: object
      properties:
        modules:
          type: array
          items:
            type: string
        role:
          type: string
          nullable: true
        organization:
          allOf:
          - $ref: '#/components/schemas/Organization'
          nullable: true
      required:
      - modules
      - organization
      - role
    Client:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        business_name:
          type: string
          maxLength: 255
        contact:
          type: string
          maxLength: 255
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
      required:
      - business_name
      - created
      - id
      - modified
    Doctor:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        specialty:
          type: string
          maxLength: 128
        hospital:
          type: string
          maxLength: 255
        is_active:
          type: boolean
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
      required:
      - created
      - id
      - modified
      - name
    IndustryTypeEnum:
      enum:
      - clinical
      - logistics
      - mixed
      type: string
      description: |-
        * `clinical` - Clínico / hospitalario
        * `logistics` - Logístico / comercial
        * `mixed` - Mixto
    LogisticsDashboardStats:
      type: object
      properties:
        pending_requisitions:
          type: integer
        requisitions_in_transit:
          type: integer
        open_sales_orders:
          type: integer
        open_purchase_orders:
          type: integer
      required:
      - open_purchase_orders
      - open_sales_orders
      - pending_requisitions
      - requisitions_in_transit
    MedicalDashboardStats:
      type: object
      properties:
        kits_in_transit:
          type: integer
        kits_assembling:
          type: integer
        active_procedures:
          type: integer
      required:
      - active_procedures
      - kits_assembling
      - kits_in_transit
    Message:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    Organization:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        industry_type:
          $ref: '#/components/schemas/IndustryTypeEnum'
        is_active:
          type: boolean
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
      required:
      - created
      - id
      - modified
      - name
      - slug
    PaginatedClientList:
      type: object
